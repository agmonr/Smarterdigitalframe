<style>
    :root {
        --primary-color: #2563eb;
        --nav-bg: #ffffff;
        --nav-text: #374151;
        --nav-hover: #f3f4f6;
        --dropdown-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
    }

    .top-nav {
        display: flex;
        flex-direction: row;
        justify-content: center;
        align-items: center;
        background: var(--nav-bg);
        padding: 0.5rem 1rem;
        margin: 0 auto 2rem auto;
        width: 100%;
        max-width: 1000px;
        box-sizing: border-box;
        border-bottom: 1px solid #e5e7eb;
        position: sticky;
        top: 0;
        z-index: 1000;
        gap: 0.5rem;
    }

    .top-nav a, .dropbtn {
        color: var(--nav-text);
        text-decoration: none;
        font-weight: 500;
        padding: 0.6rem 1rem;
        border-radius: 0.375rem;
        transition: all 0.2s ease;
        font-size: 0.925rem;
        display: flex;
        align-items: center;
        gap: 0.25rem;
    }

    .top-nav a:hover, .dropdown:hover .dropbtn {
        background-color: var(--nav-hover);
        color: var(--primary-color);
    }

    /* Active link style */
    .top-nav a.active {
        background-color: #eff6ff;
        color: var(--primary-color);
        font-weight: 600;
    }

    .dropdown { position: relative; }

    .dropdown-content {
        display: none;
        position: absolute;
        top: 100%;
        left: 50%;
        transform: translateX(-50%);
        background-color: #fff;
        min-width: 180px;
        box-shadow: var(--dropdown-shadow);
        z-index: 10000;
        border-radius: 0.5rem;
        border: 1px solid #e5e7eb;
        padding: 0.5rem 0;
        margin-top: 0.25rem;
        overflow: hidden;
        animation: fadeIn 0.15s ease-out;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateX(-50%) translateY(-10px); }
        to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    .dropdown-content a {
        color: var(--nav-text);
        padding: 0.75rem 1rem;
        border-radius: 0;
        font-size: 0.875rem;
        border-bottom: none;
    }

    .dropdown-content a:hover {
        background-color: var(--nav-hover);
        color: var(--primary-color);
    }

    .dropdown:hover .dropdown-content { display: block; }
    
    /* Hover bridge */
    .dropdown::after {
        content: "";
        position: absolute;
        top: 100%;
        left: 0;
        width: 100%;
        height: 0.5rem;
    }

    @media (max-width: 768px) {
        .top-nav {
            flex-wrap: wrap;
            padding: 0.5rem;
        }
        .top-nav a, .dropbtn {
            padding: 0.5rem 0.75rem;
            font-size: 0.85rem;
        }
    }

    /* Screen Status Styles */
    .screen-status-container {
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.6rem 0.8rem;
        border-radius: 0.375rem;
        cursor: pointer;
        font-size: 0.85rem;
        color: var(--nav-text);
        transition: all 0.2s ease;
        user-select: none;
    }

    .screen-status-container:hover {
        background-color: var(--nav-hover);
    }

    .screen-icon {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background-color: #9ca3af;
        display: inline-block;
        box-shadow: 0 0 0 2px rgba(0,0,0,0.05);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .screen-icon.on {
        background-color: #10b981;
        box-shadow: 0 0 8px rgba(16, 185, 129, 0.4);
    }

    .screen-icon.off {
        background-color: #ef4444;
        box-shadow: 0 0 8px rgba(239, 68, 68, 0.4);
    }

    .screen-text {
        font-weight: 500;
        letter-spacing: 0.01em;
    }

    @media (max-width: 900px) {
        .screen-status-container {
            margin-left: 0;
            order: -1; /* Move to start on small screens if wrapped */
            width: 100%;
            justify-content: center;
            border-bottom: 1px solid #f3f4f6;
            margin-bottom: 0.25rem;
        }
    }
</style>

<div class="top-nav" id="main-nav">
    <a href="/" data-path="/">Dashboard</a>
    <a href="/history" data-path="/history">History</a>
    <a href="/google-photos" data-path="/google-photos">Google Photos</a>
    <a href="/camera" id="nav-camera" data-path="/camera" style="display: none;">Camera</a>
    <a href="/live-video" id="nav-live-video" data-path="/live-video" style="display: none;">Live Video</a>
    <a href="/folders" data-path="/folders">Folders</a>
    <div class="dropdown">
        <span class="dropbtn">Settings <small>&#9662;</small></span>
        <div class="dropdown-content">
            <a href="/settings/general" data-path="/settings/general">General</a>
            <a href="/settings/proximity" data-path="/settings/proximity">Proximity</a>
        </div>
    </div>
    <div class="dropdown">
        <span class="dropbtn">Utils <small>&#9662;</small></span>
        <div class="dropdown-content">
            <a href="/terminal">Terminal</a>
            <a href="/system">Status</a>
            <a href="/network">Network</a>
        </div>
    </div>
    <div id="screen-status-container" class="screen-status-container" title="Click to toggle screen ON/OFF">
        <span id="screen-icon" class="screen-icon"></span>
        <span id="screen-text" class="screen-text">Screen</span>
    </div>
</div>

<script>
    // Highlight active link and check camera visibility
    document.addEventListener('DOMContentLoaded', async () => {
        const currentPath = window.location.pathname;
        const navLinks = document.querySelectorAll('.top-nav a');
        navLinks.forEach(link => {
            const linkPath = link.getAttribute('href');
            if (linkPath === currentPath || (currentPath === '/' && linkPath === '/')) {
                link.classList.add('active');
                
                // If the link is inside a dropdown, highlight the dropdown button
                const dropdown = link.closest('.dropdown');
                if (dropdown) {
                    const dropbtn = dropdown.querySelector('.dropbtn');
                    if (dropbtn) {
                        dropbtn.style.backgroundColor = 'var(--nav-hover)';
                        dropbtn.style.color = 'var(--primary-color)';
                        dropbtn.style.fontWeight = '600';
                    }
                }
            }
        });

        // Check if camera is enabled
        try {
            const response = await fetch('/api/config');
            const config = await response.json();
            if (config.CAMERA && config.CAMERA.enabled && config.CAMERA.enabled.toLowerCase() === 'true') {
                document.getElementById('nav-camera').style.display = 'flex';
                document.getElementById('nav-live-video').style.display = 'flex';
            }
        } catch (err) {
            console.error("Error checking camera status", err);
        }

        // Screen Status Logic
        const screenIcon = document.getElementById('screen-icon');
        const screenText = document.getElementById('screen-text');
        const screenContainer = document.getElementById('screen-status-container');

        async function updateScreenStatus() {
            try {
                const response = await fetch('/api/screen');
                const data = await response.json();
                if (data.status === 'success') {
                    const isOn = data.state === 'on';
                    screenIcon.className = 'screen-icon ' + (isOn ? 'on' : 'off');
                    screenText.textContent = 'Screen ' + (isOn ? 'On' : 'Off');
                }
            } catch (err) {
                console.error("Error fetching screen status", err);
            }
        }

        // Initial check
        updateScreenStatus();

        // Periodic check (every 10 seconds)
        setInterval(updateScreenStatus, 10000);

        // Click to toggle
        screenContainer.addEventListener('click', async () => {
            const isCurrentlyOn = screenIcon.classList.contains('on');
            const newState = isCurrentlyOn ? 'off' : 'on';
            
            // Optimistic update
            screenIcon.className = 'screen-icon ' + newState;
            screenText.textContent = 'Screen ' + (newState === 'on' ? 'On' : 'Off');
            
            try {
                const response = await fetch('/api/screen', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ state: newState })
                });
                const data = await response.json();
                if (data.status !== 'success') {
                    // Revert on failure
                    updateScreenStatus();
                }
            } catch (err) {
                console.error("Error toggling screen", err);
                updateScreenStatus();
            }
        });
    });
</script>
