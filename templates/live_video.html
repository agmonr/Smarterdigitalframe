<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Live Video - Digital Frame</title>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; }
        .nav { margin-bottom: 20px; }
        .nav a { margin: 0 10px; color: #3498db; text-decoration: none; font-weight: bold; }
        img { width: 100%; max-width: 800px; border-radius: 8px; background: #000; }
        .settings { margin-top: 20px; }
        select { padding: 8px; font-size: 16px; }
        button { padding: 8px 16px; background: #3498db; color: white; border: none; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>
{% include "nav.html" %}
    <h1>Live Video</h1>
    <img id="video-stream" src="/api/video_feed" alt="Live Video Feed">
    <div class="settings">
        <label for="video-resolution">Resolution:</label>
        <select id="video-resolution">
            <option value="320x240">320x240</option>
            <option value="640x480">640x480</option>
            <option value="1024x768">1024x768</option>
            <option value="1280x720">1280x720 (HD)</option>
            <option value="1920x1080">1920x1080 (Full HD)</option>
        </select>
        <button onclick="saveResolution()">Update Resolution</button>
        <button id="capture-btn" onclick="captureVideo()" style="background: #e67e22; margin-left: 10px;">Capture 1m Video</button>
        <div id="capture-status" style="margin-top: 10px; font-weight: bold; color: #e67e22;"></div>
    </div>
    <script>
        async function captureVideo() {
            const btn = document.getElementById('capture-btn');
            const status = document.getElementById('capture-status');
            const videoImg = document.getElementById('video-stream');
            
            if (!confirm('Start capturing a 1-minute video? This will temporarily stop the live stream.')) return;

            btn.disabled = true;
            status.innerText = 'Stopping live stream...';
            
            // 1. Stop the live stream to release the camera
            const originalSrc = videoImg.src;
            videoImg.src = ''; 
            
            // Give the backend a moment to close the camera handle
            await new Promise(resolve => setTimeout(resolve, 2000));

            status.innerText = 'Initializing capture...';

            try {
                // 2. Trigger the backend capture
                const response = await fetch('/api/capture_video', { method: 'POST' });
                
                let data;
                const contentType = response.headers.get("content-type");
                if (contentType && contentType.indexOf("application/json") !== -1) {
                    data = await response.json();
                } else {
                    const text = await response.text();
                    throw new Error(`Server returned non-JSON response: ${text.substring(0, 100)}`);
                }
                
                if (!response.ok) {
                    throw new Error(data.error || `Server error: ${response.status}`);
                }

                let secondsLeft = 60;
                const timer = setInterval(() => {
                    secondsLeft--;
                    if (secondsLeft <= 0) {
                        clearInterval(timer);
                        status.innerText = 'Capture complete! Restarting stream...';
                        
                        // 3. Restart the live stream
                        setTimeout(() => {
                            videoImg.src = originalSrc;
                            status.innerText = '';
                            btn.disabled = false;
                        }, 2000);
                    } else {
                        status.innerText = `Recording... ${secondsLeft}s remaining`;
                    }
                }, 1000);

                status.innerText = `Recording... ${secondsLeft}s remaining`;
            } catch (err) {
                alert('Error: ' + err.message);
                videoImg.src = originalSrc; // Resume stream on error
                btn.disabled = false;
                status.innerText = '';
            }
        }
        async function saveResolution() {
            const res = document.getElementById('video-resolution').value;
            try {
                await fetch('/api/config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ CAMERA: { video_resolution: res } })
                });
                
                // Show a brief message or just wait for the restart
                const btn = document.querySelector('button');
                btn.disabled = true;
                btn.innerText = 'Restarting stream...';
                
                // Wait 3 seconds for the backend service to restart fully
                setTimeout(() => {
                    window.location.reload();
                }, 3000);
            } catch (err) {
                alert('Failed to update resolution');
            }
        }
        async function loadConfig() {
            try {
                const res = await fetch('/api/config');
                const config = await res.json();
                const currentRes = (config.CAMERA && config.CAMERA.video_resolution) || '640x480';
                document.getElementById('video-resolution').value = currentRes;
            } catch (err) {}
        }
        loadConfig();
    </script>
</body>
</html>
